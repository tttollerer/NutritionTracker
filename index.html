<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>NutritionTracker</title>
    <link
      rel="preload"
      href="/fonts/manrope-latin-600-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/manrope-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      ;(function () {
        try {
          var legacy = localStorage.getItem('nt-theme')
          var m =
            localStorage.getItem('nt-theme-mode') ||
            (legacy === 'light' || legacy === 'dark' ? legacy : null) ||
            'system'
          var v = localStorage.getItem('nt-theme-variant') || 'vital'
          var dark =
            m === 'dark' ||
            (m === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var el = document.documentElement
          el.setAttribute('data-theme', v)
          el.classList.toggle('dark', !!dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
